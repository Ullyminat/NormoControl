---
- name: Deploy NormoControl System
  hosts: normocontrol
  become: yes

  tasks:
    - name: Load local variables if they exist
      include_vars:
        file: vars.yml
      failed_when: false
      tags: always
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        pkg:
          - curl
          - git
          - jq
          - ufw
          - rsync
          - python3-pip
        state: present

    - name: Setup 2GB Swap file
      shell: |
        if [ ! -f /swapfile ]; then
          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab
        fi
      args:
        creates: /swapfile

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Copy project files to server
      synchronize:
        src: ../
        dest: "{{ app_dir }}"
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=backend/tmp"
          - "--exclude=academic.db"

    - name: Setup Backend .env file
      template:
        src: templates/backend.env.j2
        dest: "{{ app_dir }}/backend/.env"

    - name: Configure Firewall (UFW)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - '22'
        - '80'
        - '443'

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Setup systemd service
      template:
        src: templates/normocontrol.service.j2
        dest: /etc/systemd/system/normocontrol.service
      notify: Reload systemd

    - name: Ensure app is running and enabled
      systemd:
        name: normocontrol
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Deploy Docker Containers
      shell: docker compose up -d --build
      args:
        chdir: "{{ app_dir }}"
      register: compose_output

    - name: Show compose output
      debug:
        var: compose_output.stdout_lines

    - name: Restart Caddy to apply config
      shell: docker compose restart caddy
      args:
        chdir: "{{ app_dir }}"

    - name: Wait for application to be healthy
      uri:
        url: "http://localhost/api/health"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 5
      delay: 10
      ignore_errors: yes

    - name: Verify application status
      debug:
        msg: "Application is UP and running!"
      when: result.status == 200

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes
